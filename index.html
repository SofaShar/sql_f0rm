<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрационная форма</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Анкета</h1>

    <!-- Блок для вывода сообщений -->
    <?php if (isset($_GET['error'])): ?>
        <div class="error"><?= htmlspecialchars($_GET['error']) ?></div>
    <?php endif; ?>
    <?php if (isset($_GET['success'])): ?>
        <div class="success"><?= htmlspecialchars($_GET['success']) ?></div>
    <?php endif; ?>

    <form action="process.php" method="post">
        <label>ФИО:</label>
        <input type="text" name="full_name" value="<?= htmlspecialchars($_GET['full_name'] ?? '') ?>" required>
        <div class="note">Только буквы, пробелы, дефис, не более 150 символов</div>

        <label>Телефон:</label>
        <input type="tel" name="phone" value="<?= htmlspecialchars($_GET['phone'] ?? '') ?>" required>

        <label>E-mail:</label>
        <input type="email" name="email" value="<?= htmlspecialchars($_GET['email'] ?? '') ?>" required>

        <label>Дата рождения:</label>
        <input type="date" name="birth_date" value="<?= htmlspecialchars($_GET['birth_date'] ?? '') ?>" required>

        <label>Пол:</label>
        <div class="radio-group">
            <label><input type="radio" name="gender" value="male" <?= (isset($_GET['gender']) && $_GET['gender'] === 'male') ? 'checked' : '' ?>> Мужской</label>
            <label><input type="radio" name="gender" value="female" <?= (isset($_GET['gender']) && $_GET['gender'] === 'female') ? 'checked' : '' ?>> Женский</label>
        </div>

        <label>Любимый язык программирования (можно выбрать несколько):</label>
        <select name="languages[]" multiple size="6">
            <?php
            // Подключаемся к БД для получения списка языков
            require_once 'db.php'; // отдельный файл с настройками БД
            $pdo = getDB();
            $stmt = $pdo->query("SELECT id, name_language FROM language");
            $languages = $stmt->fetchAll(PDO::FETCH_ASSOC);
            $selected = isset($_GET['languages']) ? explode(',', $_GET['languages']) : [];
            foreach ($languages as $lang): ?>
                <option value="<?= $lang['id'] ?>" <?= in_array($lang['id'], $selected) ? 'selected' : '' ?>>
                    <?= htmlspecialchars($lang['name']) ?>
                </option>
            <?php endforeach; ?>
        </select>

        <label>Биография:</label>
        <textarea name="bio" rows="5"><?= htmlspecialchars($_GET['bio'] ?? '') ?></textarea>

        <div class="checkbox-group">
            <label><input type="checkbox" name="contract_accepted" value="1" <?= isset($_GET['contract_accepted']) ? 'checked' : '' ?>> С контрактом ознакомлен(а)</label>
        </div>

        <button type="submit">Сохранить</button>
    </form>
</div>
</body>
</html>
